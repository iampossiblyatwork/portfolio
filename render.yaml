# Render Blueprint — static site
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: james-costello-portfolio
    runtime: static
    buildCommand: ""        # no build step — plain HTML/CSS/JS
    staticPublishPath: .    # serve repo root
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
